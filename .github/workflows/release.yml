name: Release

on:
  push:
    branches: [main]

# Never run two releases at once.
concurrency: release

permissions:
  contents: write
  pull-requests: write
  # OIDC token for npm Trusted Publishing - no NPM_TOKEN secret needed, and
  # publishes carry a provenance attestation.
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm >= 11.5.1 is required for OIDC Trusted Publishing.
      - run: npm install -g npm@latest
      - run: npm ci

      # When changesets are present, opens/updates a "Version Packages" PR.
      # When a version bump has landed, publishes to npm via Trusted Publishing
      # (OIDC), with provenance. No tokens involved.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
